<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>calculus speedrun</title>

<style>
    body {
        margin: 0;
        background-color: black;
        color: white;
        font-family: "Times New Roman", Times, serif;
    }

    .header {
        text-align: center;
        padding: 40px 20px 10px 20px;
        font-size: 40px;
        font-weight: normal;
    }

    .line {
        width: 60%;
        margin: 0 auto 40px auto;
        border-bottom: 1px solid white;
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-top: 40px;
        flex-wrap: wrap;
    }

    .card {
        width: 200px;
        height: 120px;
        border: 2px solid white;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        cursor: pointer;
        transition: 0.2s;
    }

    .card:hover {
        background-color: white;
        color: black;
        transform: scale(1.05);
    }

    .menu {
        text-align: center;
        margin-top: 40px;
        display: none;
    }

    .menu h2 {
        font-weight: normal;
        margin-bottom: 20px;
    }

    .difficulty {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
    }

    .diff {
        border: 1px solid white;
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
    }

    .diff:hover {
        background-color: white;
        color: black;
    }
</style>
</head>

<body>

<div class="header">calculus speedrun</div>
<div class="line"></div>

<div class="container">
    <div class="card" onclick="openMenu('Integrals')">Integrals</div>
    <div class="card" onclick="openMenu('Derivatives')">Derivatives</div>
</div>

<div class="menu" id="menu">
    <h2 id="menuTitle"></h2>
    <div class="difficulty">
        <div class="diff">baby</div>
        <div class="diff">easy</div>
        <div class="diff">medium</div>
        <div class="diff">hard</div>
        <div class="diff">evil</div>
    </div>
</div>

<script>
function openMenu(type) {
    document.getElementById("menu").style.display = "block";
    document.getElementById("menuTitle").innerText = type + " - select difficulty";
}
</script>

</body>
</html>
