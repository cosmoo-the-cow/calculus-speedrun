<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>calculus speedrun</title>

<style>
    body {
        margin: 0;
        background-color: black;
        color: white;
        font-family: "Times New Roman", Times, serif;
        text-transform: lowercase;
    }

    .header {
        text-align: center;
        padding: 40px 20px 10px 20px;
        font-size: 40px;
        font-weight: normal;
    }

    .line {
        width: 60%;
        margin: 0 auto 40px auto;
        border-bottom: 1px solid white;
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-top: 40px;
        flex-wrap: wrap;
    }

    .card {
        width: 200px;
        height: 120px;
        border: 2px solid white;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        cursor: pointer;
        transition: 0.2s;
    }

    .card:hover {
        background-color: white;
        color: black;
        transform: scale(1.05);
    }

    .menu {
        text-align: center;
        margin-top: 40px;
        display: none;
    }

    .menu h2 {
        font-weight: normal;
        margin-bottom: 20px;
    }

    .difficulty {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
    }

    .diff {
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid rgba(255,255,255,0.4);
        color: black;
        font-weight: bold;
    }

    /* difficulty colors */
    .baby { background: #7fd3ff; }
    .easy { background: #5cff7a; }
    .medium { background: #ffe45c; }
    .hard { background: #ff5c5c; }
    .evil { background: #b15cff; }

    /* hover keeps contrast (slightly darker but still readable) */
    .baby:hover { background: #5bbbe6; }
    .easy:hover { background: #3fd65c; }
    .medium:hover { background: #e6c94a; }
    .hard:hover { background: #e64a4a; }
    .evil:hover { background: #8e3fe6; }

</style>
</head>

<body>

<div class="header">calculus speedrun</div>
<div class="line"></div>

<div class="container">
    <div class="card" onclick="openMenu('integrals')">integrals</div>
    <div class="card" onclick="openMenu('derivatives')">derivatives</div>
</div>

<div class="menu" id="menu">
    <h2 id="menuTitle"></h2>

    <div class="difficulty">
        <div class="diff baby">baby</div>
        <div class="diff easy">easy</div>
        <div class="diff medium">medium</div>
        <div class="diff hard">hard</div>
        <div class="diff evil">evil</div>
    </div>
</div>

<script>
function openMenu(type) {
    document.getElementById("menu").style.display = "block";
    document.getElementById("menuTitle").innerText = type + " - select difficulty";
}
</script>

</body>
</html>
