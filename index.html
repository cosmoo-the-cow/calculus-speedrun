<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>calculus speedrun</title>

<style>
    body {
        margin: 0;
        background-color: black;
        color: white;
        font-family: "Times New Roman", Times, serif;
        text-transform: lowercase;

        /* small subtle grid */
        background-image:
            linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 25px 25px;
    }

    .header {
        text-align: center;
        padding: 40px 20px 10px 20px;
        font-size: 40px;
    }

    .line {
        width: 60%;
        margin: 0 auto 40px auto;
        border-bottom: 1px solid white;
        opacity: 0.6;
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-top: 60px;
        flex-wrap: wrap;
    }

    /* main cards stay old-school white */
    .card {
        width: 220px;
        height: 130px;
        border: 2px solid white;
        border-radius: 16px;

        display: flex;
        align-items: center;
        justify-content: center;

        font-size: 26px;
        cursor: pointer;

        background-color: black;
        transition: 0.2s ease;
        color: white;
    }

    .card:hover {
        background-color: white;
        color: black;
        transform: scale(1.06);
    }

    .menu {
        text-align: center;
        margin-top: 50px;
        display: none;
    }

    .menu h2 {
        font-weight: normal;
        margin-bottom: 20px;
    }

    .difficulty {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
    }

    /* difficulty buttons: white text only */
    .diff {
        width: 140px;
        padding: 12px 0;
        border-radius: 12px;

        cursor: pointer;
        transition: 0.25s ease;

        border: 2px solid white;
        color: white;
        font-weight: normal;
        text-align: center;
        background: black;
    }

    /* glow-only hover (no background fill) */
    .baby:hover {
        box-shadow: 0 0 10px #7fd3ff;
        border-color: #7fd3ff;
        transform: scale(1.06);
    }

    .easy:hover {
        box-shadow: 0 0 10px #5cff7a;
        border-color: #5cff7a;
        transform: scale(1.06);
    }

    .medium:hover {
        box-shadow: 0 0 10px #ffe45c;
        border-color: #ffe45c;
        transform: scale(1.06);
    }

    .hard:hover {
        box-shadow: 0 0 10px #ff5c5c;
        border-color: #ff5c5c;
        transform: scale(1.06);
    }

    .evil:hover {
        box-shadow: 0 0 10px #b15cff;
        border-color: #b15cff;
        transform: scale(1.06);
    }

</style>
</head>

<body>

<div class="header">calculus speedrun</div>
<div class="line"></div>

<div class="container">
    <div class="card" onclick="openMenu('integrals')">
        integrals
    </div>

    <div class="card" onclick="openMenu('derivatives')">
        derivatives
    </div>
</div>

<div class="menu" id="menu">
    <h2 id="menuTitle"></h2>

    <div class="difficulty">
        <div class="diff baby">baby</div>
        <div class="diff easy">easy</div>
        <div class="diff medium">medium</div>
        <div class="diff hard">hard</div>
        <div class="diff evil">evil</div>
    </div>
</div>

<script>
function openMenu(type) {
    document.getElementById("menu").style.display = "block";
    document.getElementById("menuTitle").innerText = type + " - select difficulty";
}
</script>

</body>
</html>
