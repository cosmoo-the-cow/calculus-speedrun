<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>calculus speedrun</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: "times new roman", serif;
    text-transform: lowercase;

    background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 25px 25px;
    overflow-x: hidden;
}

.header {
    text-align: center;
    padding: 40px 20px 10px;
    font-size: 40px;
}

.line {
    width: 60%;
    margin: 0 auto 40px;
    border-bottom: 1px solid white;
    opacity: 0.6;
}

.container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 60px;
    flex-wrap: wrap;
}

.card {
    width: 220px;
    height: 110px;

    border: 2px solid white;
    border-radius: 16px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 26px;
    cursor: pointer;

    background: black;
    color: white;

    transition:
        transform 0.2s ease,
        background-color 0.2s ease,
        color 0.2s ease;
}

.card:hover {
    background: white;
    color: black;
    transform: scale(1.06);
}

.card:active {
    transform: scale(0.98);
}

.card.active {
    background: white;
    color: black;
}

.menu {
    text-align: center;
    margin-top: 50px;

    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease;
}

.menu.visible {
    opacity: 1;
    visibility: visible;
}

.menu h2 {
    font-weight: normal;
    margin-bottom: 20px;
}

.difficulty {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
}

.diff {
    width: 140px;
    padding: 12px 0;

    border: 2px solid white;
    border-radius: 12px;

    background: black;
    color: white;

    cursor: pointer;
    text-align: center;

    transition: 0.25s ease;
}

.baby:hover {
    box-shadow: 0 0 10px #7fd3ff;
    border-color: #7fd3ff;
    transform: scale(1.06);
}

.easy:hover {
    box-shadow: 0 0 10px #5cff7a;
    border-color: #5cff7a;
    transform: scale(1.06);
}

.medium:hover {
    box-shadow: 0 0 10px #ffe45c;
    border-color: #ffe45c;
    transform: scale(1.06);
}

.hard:hover {
    box-shadow: 0 0 10px #ff5c5c;
    border-color: #ff5c5c;
    transform: scale(1.06);
}

.evil:hover {
    box-shadow: 0 0 10px #b15cff;
    border-color: #b15cff;
    transform: scale(1.06);
}

.version {
    position: fixed;
    bottom: 8px;
    left: 8px;

    font-size: 12px;
    font-family: monospace;

    color: rgba(255,255,255,0.35);

    pointer-events: none;
    z-index: 10;
}

.reveal-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-image: url('lol.jpeg');
    background-size: cover;
    background-position: center;
    z-index: -2;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.1s ease;
}

.split-active .reveal-bg {
    opacity: 1;
    visibility: visible;
}
.split-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 25px 25px;
    z-index: -1; 
    pointer-events: none;
    transition: transform 1.8s cubic-bezier(0.77, 0, 0.175, 1);
}

.split-overlay.top-left {
    clip-path: polygon(0 0, 100% 0, 0 100%);
}

.split-overlay.bottom-right {
    clip-path: polygon(100% 0, 100% 100%, 0 100%);
}

.split-active .split-overlay.top-left {
    transform: translate(-100%, -100%);
}

.split-active .split-overlay.bottom-right {
    transform: translate(100%, 100%);
}

.main-content {
    transition: opacity 1s ease;
    opacity: 1;
}

.split-active .main-content {
    opacity: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="main-content" id="mainContent">
    <div class="header">calculus speedrun</div>
    <div class="line"></div>

    <div class="container">
        <div class="card" onclick="openMenu(this, 'integrals')">
            integrals
        </div>
        <div class="card" onclick="openMenu(this, 'derivatives')">
            derivatives
        </div>
    </div>

    <div class="menu" id="menu">
        <h2 id="menuTitle">select a category</h2>
        <div class="difficulty">
            <div class="diff baby" onclick="triggerSplit()">baby</div>
            <div class="diff easy" onclick="triggerSplit()">easy</div>
            <div class="diff medium" onclick="triggerSplit()">medium</div>
            <div class="diff hard" onclick="triggerSplit()">hard</div>
            <div class="diff evil" onclick="triggerSplit()">evil</div>
        </div>
    </div>
</div>

<div class="version">v1.1</div>

<div class="reveal-bg"></div>

<div class="split-overlay top-left"></div>
<div class="split-overlay bottom-right"></div>

<script>
function openMenu(card, type) {
    document.querySelectorAll(".card").forEach(c => {
        c.classList.remove("active");
    });

    card.classList.add("active");

    document.getElementById("menuTitle").innerText =
        type + " - select difficulty";

    document.getElementById("menu")
        .classList.add("visible");
}

function triggerSplit() {
    document.body.classList.add("split-active");
}
</script>

</body>
</html>
